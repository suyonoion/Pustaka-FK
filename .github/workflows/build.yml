name: Pabrik Perakitan Biner FK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Mengunci Repositori
      uses: actions/checkout@v4

    - name: Kalibrasi Mesin Java (JDK 17)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Injeksi Mesin Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Eksekusi Kompilasi APK (Biner)
      run: gradle assembleDebug --no-daemon

    - name: Ekspor Artefak APK
      uses: actions/upload-artifact@v4
      with:
        name: Arsip-FK-Solid-APK
        path: app/build/outputs/apk/debug/app-debug.apk
